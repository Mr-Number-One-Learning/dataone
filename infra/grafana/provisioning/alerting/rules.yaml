apiVersion: 1
groups:
  - orgId: 1
    name: "Data Quality Alerts"
    folder: "DataOne Alerts"
    interval: 1m
    rules:
      - uid: "high_quarantine_rate"
        title: "High Quarantine Rate"
        condition: "C"
        data:
          - refId: "A"
            queryType: "sql"
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "dataone-clickhouse"
            model:
              queryType: "sql"
              format: 1
              rawSql: "SELECT coalesce(sum(row_count), 0) FROM quarantine_summary WHERE batch_date = today()"
              refId: "A"
          - refId: "B"
            queryType: "sql"
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "dataone-clickhouse"
            model:
              queryType: "sql"
              format: 1
              rawSql: "SELECT coalesce(sum(order_count), 0) FROM daily_sales WHERE sales_date = today()"
              refId: "B"
          - refId: "C"
            queryType: ""
            datasourceUid: "__expr__"
            model:
              type: "math"
              expression: "$A / ($A + $B) > 0.05"
              refId: "C"
        noDataState: "OK"
        execErrState: "Alerting"
        for: "5m"
        annotations:
          summary: "Quarantine rate is above 5%"
        labels:
          severity: "warning"

  - orgId: 1
    name: "Infrastructure Alerts"
    folder: "DataOne Alerts"
    interval: 1m
    rules:
      - uid: "kafka_consumer_lag"
        title: "High Kafka Consumer Lag"
        condition: "B"
        data:
          - refId: "A"
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "dataone-prometheus"
            model:
              # danielqsj/kafka-exporter exposes `kafka_consumergroup_lag_sum`
              # (no underscore between consumer and group).
              expr: "kafka_consumergroup_lag_sum{consumergroup=\"dataone-streaming\"}"
              refId: "A"
          - refId: "B"
            queryType: ""
            datasourceUid: "__expr__"
            model:
              type: "math"
              expression: "$A > 10000"
              refId: "B"
        noDataState: "OK"
        execErrState: "Alerting"
        for: "5m"
        annotations:
          summary: "Kafka consumer lag exceeds 10,000 for dataone-streaming"
        labels:
          severity: "critical"
