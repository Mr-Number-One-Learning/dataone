version: "3.9"

# Profiles:
#   core  -> always-on services (run with: docker compose --profile core up -d)
#   batch -> on-demand Spark batch worker, started only for the nightly ETL run
#            (docker compose --profile core --profile batch up -d spark-worker-batch
#             then: docker compose stop spark-worker-batch when the job finishes)
#
# Service memory limits below reflect the laptop-scale RAM/CPU budget this
# stack is built against — keep them in sync when adding services.

networks:
  dataone-net:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  kafka-data:
  clickhouse-data:
  nifi-data:
  nifi-conf:
  lakehouse-data:
  prometheus-data:
  grafana-data:
  marquez-data:

    # Built once (Iceberg + Postgres/ClickHouse JDBC jars layered onto the
    # official apache/spark image — see infra/docker/spark/Dockerfile), reused by
    # all three Spark services below via the YAML merge key.
x-spark-image: &spark-image
  build:
    context: ./infra/docker/spark
    dockerfile: Dockerfile
  image: dataone-spark:3.5.1-iceberg1.9.1
  env_file:
    - .env

services:

  # ---------------- Streaming / ingestion ----------------

  kafka:
    image: apache/kafka:3.7.0
    profiles: [ "core" ]
    container_name: dataone-kafka
    networks: [ dataone-net ]
    ports:
      - "9092:9092"
    environment:
      KAFKA_HEAP_OPTS: "-Xmx768m -Xms768m"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: "1"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    mem_limit: "1g"
    cpus: "1.0"

  # Resolves a Docker volume permission conflict: Spark runs as root, NiFi runs
  # as UID 1000. When Spark creates the lakehouse volume, it defaults to root:root.
  # This init container runs first to open permissions so NiFi can write staging files.
  init-lakehouse:
    image: alpine:3.19
    profiles: [ "core" ]
    container_name: dataone-init-lakehouse
    networks: [ dataone-net ]
    volumes:
      - lakehouse-data:/data/lakehouse
    command: >
      sh -c "mkdir -p /data/lakehouse/staging/campaigns &&
             chmod -R 777 /data/lakehouse"

  nifi:
    image: apache/nifi:1.27.0
    profiles: [ "core" ]
    container_name: dataone-nifi
    networks: [ dataone-net ]
    ports:
      - "8443:8443"
      # Plain-HTTP ListenHTTP endpoint for the reviews ingestion flow (NOT
      # NiFi's own HTTPS UI/API, which stays on 8443). See
      # docs/NIFI_FLOWS_GUIDE.md.
      - "${NIFI_REVIEWS_LISTEN_PORT}:${NIFI_REVIEWS_LISTEN_PORT}"
    environment:
      NIFI_JVM_HEAP_INIT: "512m"
      NIFI_JVM_HEAP_MAX: "1536m"
      SINGLE_USER_CREDENTIALS_USERNAME: "${NIFI_USERNAME}"
      SINGLE_USER_CREDENTIALS_PASSWORD: "${NIFI_PASSWORD}"
    volumes:
      - nifi-data:/opt/nifi/nifi-current/data
      - nifi-conf:/opt/nifi/nifi-current/conf
      - ./data:/data
      - ./src/nifi_flows:/opt/nifi/nifi-current/flows
      # Shared with the Spark containers — this is where the campaigns flow
      # lands its staged output for the batch job to pick up.
      - lakehouse-data:/data/lakehouse
    depends_on:
      init-lakehouse:
        condition: service_completed_successfully
    mem_limit: "2g"
    cpus: "1.0"

  # ---------------- Storage ----------------

  postgres:
    image: postgres:16-alpine
    profiles: [ "core" ]
    container_name: dataone-postgres
    networks: [ dataone-net ]
    ports:
      - "5445:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    command: [ "-c", "shared_buffers=128MB", "-c", "max_connections=50" ]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: "512m"
    cpus: "0.5"

  mongodb:
    image: mongo:7
    profiles: [ "core" ]
    container_name: dataone-mongodb
    networks: [ dataone-net ]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USER}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD}"
      MONGO_INITDB_DATABASE: "${MONGO_DB}"
    command: [ "--wiredTigerCacheSizeGB", "0.25" ]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: "512m"
    cpus: "0.5"

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    profiles: [ "core" ]
    container_name: dataone-clickhouse
    networks: [ dataone-net ]
    ports:
      - "8123:8123"
      - "9000:9000"
      - "9363:9363" # Prometheus metrics endpoint — see infra/docker/clickhouse/conf.d/prometheus.xml
    environment:
      CLICKHOUSE_DB: "${CLICKHOUSE_DB}"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./infra/docker/clickhouse/init:/docker-entrypoint-initdb.d
      - ./infra/docker/clickhouse/conf.d:/etc/clickhouse-server/config.d
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      kafka:
        condition: service_healthy
    mem_limit: "1536m"
    cpus: "1.0"

  # ---------------- Monitoring exporters ----------------
  # ClickHouse needs no separate exporter (built-in endpoint, enabled via
  # infra/docker/clickhouse/conf.d/prometheus.xml above).

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    profiles: [ "core" ]
    container_name: dataone-postgres-exporter
    networks: [ dataone-net ]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Uses the literal Docker service name "postgres" — this exporter
      # runs INSIDE the docker network, unlike the host-run generator
      # scripts, so it needs the Docker DNS name, not config.py's
      # host-auto-detected "localhost".
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable"
    mem_limit: "128m"
    cpus: "0.2"

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.3.1
    profiles: [ "core" ]
    container_name: dataone-kafka-exporter
    networks: [ dataone-net ]
    depends_on:
      kafka:
        condition: service_healthy
    command: [ "--kafka.server=kafka:29092" ]
    # NOTE: this is a protocol-level exporter (talks Kafka's native wire
    # protocol), not a true JMX-agent sidecar — chosen because it requires
    # zero modification to the pinned apache/kafka image (no javaagent to
    # inject), while still covering the metrics that matter here (broker
    # count, topic/partition info, consumer group lag).
    mem_limit: "128m"
    cpus: "0.2"

  cadvisor:
    # v0.53.0+ moved to ghcr.io/google/cadvisor — gcr.io/cadvisor/cadvisor
    # (still shown in most older tutorials) is the legacy registry.
    image: ghcr.io/google/cadvisor:0.55.1
    profiles: [ "core" ]
    container_name: dataone-cadvisor
    networks: [ dataone-net ]
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    # Simplification, consistent with the Spark image running as root (see
    # infra/docker/spark/Dockerfile): cAdvisor's standard recipe needs broad
    # host introspection access to report per-container stats at all. Fine
    # for local dev; on Docker Desktop (Mac/Windows) this introspects the
    # Desktop VM, not the literal host OS, which is exactly what we want
    # since every other service here runs inside that same VM too.
    mem_limit: "512m"
    cpus: "0.3"

  spark-master:
    <<: *spark-image
    profiles: [ "core" ]
    container_name: dataone-spark-master
    networks: [ dataone-net ]
    ports:
      - "7077:7077"
      - "8099:8080"
    command: bash -c "mkdir -p /opt/spark/conf && echo 'spark.ui.prometheus.enabled=true' > /opt/spark/conf/spark-defaults.conf && echo 'spark.metrics.conf=/opt/spark/conf/metrics.properties' >> /opt/spark/conf/spark-defaults.conf && echo '*.sink.prometheusServlet.class=org.apache.spark.metrics.sink.PrometheusServlet' > /opt/spark/conf/metrics.properties && echo '*.sink.prometheusServlet.path=/metrics/prometheus' >> /opt/spark/conf/metrics.properties && echo 'master.sink.prometheusServlet.path=/metrics/master/prometheus' >> /opt/spark/conf/metrics.properties && /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --properties-file /opt/spark/conf/spark-defaults.conf"
    mem_limit: "512m"
    cpus: "0.5"

  spark-worker-streaming:
    <<: *spark-image
    profiles: [ "core" ]
    container_name: dataone-spark-worker-streaming
    networks: [ dataone-net ]
    depends_on:
      spark-master:
        condition: service_started
      kafka:
        condition: service_healthy
      init-lakehouse:
        condition: service_completed_successfully
    command: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "${SPARK_MASTER_URL}" ]
    environment:
      # Kept slightly under mem_limit (1536m) so the JVM heap isn't fighting
      # the container cap for its own off-heap overhead.
      SPARK_WORKER_MEMORY: "1331m"
      SPARK_WORKER_CORES: "1"
      PYTHONPATH: "/opt/dataone/src"
    volumes:
      - lakehouse-data:/data/lakehouse
      - ./src:/opt/dataone/src
    mem_limit: "1536m"
    cpus: "1.0"

  spark-worker-batch:
    <<: *spark-image
    profiles: [ "batch" ]
    container_name: dataone-spark-worker-batch
    networks: [ dataone-net ]
    depends_on:
      spark-master:
        condition: service_started
      init-lakehouse:
        condition: service_completed_successfully
    command: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "${SPARK_MASTER_URL}" ]
    environment:
      # Kept slightly under mem_limit (2g) for the same reason as the
      # streaming worker above.
      SPARK_WORKER_MEMORY: "5g"
      SPARK_WORKER_CORES: "2"
      PYTHONPATH: "/opt/dataone/src"
    volumes:
      - lakehouse-data:/data/lakehouse
      - ./src:/opt/dataone/src
    mem_limit: "6g"
    cpus: "2.0"

  # ---------------- Monitoring ----------------

  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: [ "core" ]
    container_name: dataone-prometheus
    networks: [ dataone-net ]
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    mem_limit: "384m"
    cpus: "0.3"

  grafana:
    image: grafana/grafana:11.0.0
    profiles: [ "core" ]
    container_name: dataone-grafana
    networks: [ dataone-net ]
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_INSTALL_PLUGINS: "grafana-clickhouse-datasource"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
      ALERT_WEBHOOK_URL: "${ALERT_WEBHOOK_URL:-http://localhost}"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_started
      clickhouse:
        condition: service_healthy
    mem_limit: "384m"
    cpus: "0.3"

  # ---------------- UI Tools ----------------

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    profiles: [ "core" ]
    container_name: dataone-kafka-ui
    networks: [ dataone-net ]
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: dataone
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    mem_limit: "384m"
    cpus: "0.5"

  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    profiles: [ "core" ]
    container_name: dataone-mongo-express
    networks: [ dataone-net ]
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: "${MONGO_USER}"
      ME_CONFIG_MONGODB_ADMINPASSWORD: "${MONGO_PASSWORD}"
      ME_CONFIG_MONGODB_URL: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/"
    depends_on:
      mongodb:
        condition: service_healthy
    mem_limit: "128m"
    cpus: "0.2"

  tabix:
    image: vchernikh/tabix:latest
    profiles: [ "core" ]
    container_name: dataone-tabix
    networks: [ dataone-net ]
    ports:
      - "${TABIX_PORT:-8088}:80"
    depends_on:
      clickhouse:
        condition: service_healthy
    mem_limit: "128m"
    cpus: "0.2"

  # ---------------- Data Lineage ----------------

  marquez-db:
    image: postgres:14-alpine
    profiles: [ "core" ]
    container_name: dataone-marquez-db
    networks: [ dataone-net ]
    environment:
      POSTGRES_USER: ${MARQUEZ_USER:-marquez}
      POSTGRES_PASSWORD: ${MARQUEZ_PASSWORD:-marquez_password}
      POSTGRES_DB: marquez
    volumes:
      - marquez-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U marquez" ]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: "256m"
    cpus: "0.3"

  marquez-api:
    image: marquezproject/marquez:0.43.0
    profiles: [ "core" ]
    container_name: dataone-marquez-api
    networks: [ dataone-net ]
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      JAVA_OPTS: "-Ddw.db.url=jdbc:postgresql://marquez-db:5432/marquez -Ddw.db.user=${MARQUEZ_USER:-marquez} -Ddw.db.password=${MARQUEZ_PASSWORD:-marquez_password}"
      MARQUEZ_DB_MIGRATION_ON_STARTUP: "true"
    depends_on:
      marquez-db:
        condition: service_healthy
    mem_limit: "512m"
    cpus: "0.5"

  marquez-web:
    image: marquezproject/marquez-web:0.43.0
    profiles: [ "core" ]
    container_name: dataone-marquez-web
    networks: [ dataone-net ]
    ports:
      - "3001:3000"
    environment:
      MARQUEZ_HOST: marquez-api
      MARQUEZ_PORT: 5000
    depends_on:
      marquez-api:
        condition: service_started
    mem_limit: "128m"
    cpus: "0.2"

  marquez-kafka-consumer:
    image: python:3.10-slim
    profiles: [ "core" ]
    container_name: dataone-marquez-kafka-consumer
    networks: [ dataone-net ]
    depends_on:
      kafka:
        condition: service_healthy
      marquez-api:
        condition: service_started
    command: >
      bash -c "pip install confluent-kafka requests && python /opt/dataone/src/dataone/utils/marquez_consumer.py"
    volumes:
      - ./src:/opt/dataone/src
    mem_limit: "128m"
    cpus: "0.2"
