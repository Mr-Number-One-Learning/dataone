<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="15" fill="#0D1117"/>
  <!-- Connecting Lines -->
  <line x1="25" y1="50" x2="50" y2="30" stroke="#FF6B6B" stroke-width="4"/>
  <line x1="25" y1="50" x2="50" y2="70" stroke="#FF6B6B" stroke-width="4"/>
  <line x1="50" y1="30" x2="75" y2="50" stroke="#FF6B6B" stroke-width="4"/>
  <line x1="50" y1="70" x2="75" y2="50" stroke="#FF6B6B" stroke-width="4"/>
  <!-- Nodes -->
  <circle cx="25" cy="50" r="10" fill="#4D96FF"/>
  <circle cx="50" cy="30" r="10" fill="#6BCB77"/>
  <circle cx="50" cy="70" r="10" fill="#6BCB77"/>
  <circle cx="75" cy="50" r="10" fill="#FFD93D"/>
</svg>
