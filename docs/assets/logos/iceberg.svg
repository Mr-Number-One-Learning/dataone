<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="15" fill="#0C2340"/>
  <!-- Sea Level -->
  <line x1="5" y1="50" x2="95" y2="50" stroke="#00A3E0" stroke-width="2" stroke-dasharray="4 2"/>
  <!-- Tip of Iceberg -->
  <polygon points="50,15 35,50 65,50" fill="#E8F4F8"/>
  <polygon points="50,15 45,50 55,50" fill="#D3E9F1"/>
  <!-- Submerged Iceberg -->
  <polygon points="50,85 25,50 75,50" fill="#00A3E0" opacity="0.8"/>
  <polygon points="50,85 40,50 60,50" fill="#0080B0" opacity="0.8"/>
</svg>
